server {
    listen       80;
    listen  [::]:80;
    server_name  _;
    root   /usr/share/nginx/html;
    index  index.html;

    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types text/css application/javascript application/json image/svg+xml application/xml text/plain;

    # Security headers (site-wide)
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Frame-Options "DENY" always;
    add_header Permissions-Policy "microphone=(self)" always;

    # Always revalidate the app shell + service worker so updates ship
    location = /index.html {
        add_header Cache-Control "no-cache" always;
        add_header X-Content-Type-Options "nosniff" always;
    }
    location = /sw.js {
        add_header Cache-Control "no-cache" always;
        add_header X-Content-Type-Options "nosniff" always;
    }
    location = /manifest.json {
        add_header Cache-Control "no-cache" always;
    }

    # Long-cache fingerprint-free static assets (7 days)
    location ~* \.(css|js|png|jpg|jpeg|svg|ico|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # Deny hidden/dotfiles (.git, etc.) instead of falling back to the app
    location ~ /\. {
        return 404;
    }

    # Hash-routed SPA: any unknown path falls back to the app shell
    location / {
        try_files $uri $uri/ /index.html;
    }
}
